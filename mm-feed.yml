name: MediaMarkt feed
on:
  schedule:
    - cron: '0 */6 * * *'   # elke 6 uur
  workflow_dispatch: {}       # handmatig knopje in GitHub
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Genereer MediaMarkt JSON
        env:
          MM_TOKEN: ${{ secrets.MM_TOKEN }}
        run: node generate.mjs
      - name: Commit & push
        run: |
          git config user.name "mm-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "MediaMarkt feed update $(date -u +%FT%TZ)"
          git push
